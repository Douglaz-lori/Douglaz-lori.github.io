<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal da Guilda - Visão de Anime</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .guilda-container {
            background-color: #000;
            border: 4px solid #0000FF; /* Azul da Guilda */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 25px #FFFF00; /* Amarelo da Guilda */
            max-width: 600px;
        }

        h1 {
            color: #FFFF00;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #0000FF;
            padding-bottom: 10px;
        }

        .passo {
            margin: 15px 0;
            padding: 10px;
            background: rgba(0, 0, 255, 0.1);
            border-left: 5px solid #FFFF00;
            text-align: left;
        }

        .reliquia-botao {
            display: inline-block;
            margin-top: 20px;
            padding: 20px 40px;
            background-color: #0000FF;
            color: #FFFF00;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            border: 2px solid #FFFF00;
            border-radius: 5px;
            cursor: move;
        }

        .reliquia-botao:hover {
            background-color: #FFFF00;
            color: #0000FF;
        }
    </style>
</head>
<body>

    <div class="guilda-container">
        <h1>⚔️ Visão da Guilda ⚔️</h1>
        <p>Solução final para o bloqueio da Crunchyroll.</p>

        <div class="passo">
            1. Arraste o botão para a sua <b>Barra de Favoritos</b> (Ctrl+Shift+B).
        </div>

        <a class="reliquia-botao" href="javascript:(function(){
            var url = prompt('Cole o link do episódio da Crunchyroll:');
            if(url){
                /* Abre em janela separada para o site não recusar a conexão */
                var w = 854; var h = 480;
                var left = (screen.width/2)-(w/2);
                var top = (screen.height/2)-(h/2);
                var win = window.open(url, 'VisaoGuilda', 'width='+w+',height='+h+',top='+top+',left='+left+',toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes');
                if (win) { 
                    win.focus(); 
                    alert('🛡️ Artefato Ativado! Ajuste a janela sobre a sua live.');
                } else { 
                    alert('⚠️ Pop-up bloqueado! Clique no ícone de X na barra de endereços e escolha SEMPRE PERMITIR.'); 
                }
            }
        })()">🛡️ ATIVAR VISÃO v4</a>

        <div class="passo">
            2. Quando a janela abrir, ela não terá barras de menu, parecendo um player nativo.
        </div>
    </div>

</body>
</html>
