<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal da Guilda - Visão Crunchyroll</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .guilda-container {
            background-color: #000;
            border: 4px solid #0000FF; /* Azul */
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 25px #FFFF00; /* Amarelo */
            max-width: 600px;
        }

        h1 {
            color: #FFFF00;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #0000FF;
            padding-bottom: 10px;
        }

        .passo {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 255, 0.1);
            border-left: 5px solid #FFFF00;
        }

        .reliquia-botao {
            display: inline-block;
            margin-top: 20px;
            padding: 20px 40px;
            background-color: #0000FF;
            color: #FFFF00;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            border: 2px solid #FFFF00;
            border-radius: 5px;
            cursor: move;
            transition: all 0.3s;
        }

        .reliquia-botao:hover {
            background-color: #FFFF00;
            color: #0000FF;
        }
    </style>
</head>
<body>

    <div class="guilda-container">
        <h1>⚔️ Visão da Guilda ⚔️</h1>
        <p>Artefato atualizado para <b>Crunchyroll</b> e outros portais.</p>

        <div class="passo">
            1. Arraste o botão abaixo para a sua <b>Barra de Favoritos</b>.
        </div>

        <a class="reliquia-botao" href="javascript:(function(){
            var url = prompt('Cole o link do episódio da Crunchyroll:');
            if(url){
                var largura = 854;
                var altura = 480;
                var esquerda = (screen.width - largura) / 2;
                var topo = (screen.height - altura) / 2;
                window.open(url, 'VisaoDaGuilda', 'width='+largura+',height='+altura+',top='+topo+',left='+esquerda+',toolbar=no,location=no,status=no,menubar=no,scrollbars=no,resizable=yes');
            }
        })()">🛡️ ARTEFATO DE VISÃO v2</a>

        <div class="passo">
            2. Durante a Live, clique no favorito e cole o link do episódio.
        </div>

        <div class="passo">
            3. Ajuste a janelinha que abrir sobre a Live da Kick!
        </div>
    </div>

</body>
</html>
