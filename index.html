<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal da Guilda - Visão de Anime</title>
    <style>
        body {
            background-color: #050505;
            color: #ffffff;
            font-family: 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .guilda-container {
            background-color: #000;
            border: 4px solid #0000FF;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 25px #FFFF00;
            max-width: 600px;
        }

        h1 {
            color: #FFFF00;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px solid #0000FF;
            padding-bottom: 10px;
        }

        .passo {
            margin: 20px 0;
            padding: 15px;
            background: rgba(0, 0, 255, 0.1);
            border-left: 5px solid #FFFF00;
            text-align: left;
        }

        .reliquia-botao {
            display: inline-block;
            margin-top: 20px;
            padding: 20px 40px;
            background-color: #0000FF;
            color: #FFFF00;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2em;
            border: 2px solid #FFFF00;
            border-radius: 5px;
            cursor: move;
        }

        .reliquia-botao:hover {
            background-color: #FFFF00;
            color: #0000FF;
        }
    </style>
</head>
<body>

    <div class="guilda-container">
        <h1>⚔️ Visão da Guilda ⚔️</h1>
        <p>Artefato otimizado para evitar o bloqueio da Crunchyroll.</p>

        <div class="passo">
            <b>1.</b> Arraste o botão azul para a sua <b>Barra de Favoritos</b> (Ctrl+Shift+B).
        </div>

        <a class="reliquia-botao" href="javascript:(function(){
            var url = prompt('Cole o link da Crunchyroll:');
            if(url){
                var w = 854; var h = 480;
                var left = (screen.width/2)-(w/2);
                var top = (screen.height/2)-(h/2);
                var win = window.open(url, 'VisaoGuilda', 'width='+w+',height='+h+',top='+top+',left='+left+',toolbar=no,location=no,directories=no,status=no,menubar=no,scrollbars=no,resizable=yes');
                if (win) { win.focus(); } 
                else { alert('⚠️ O navegador bloqueou o pop-up! Clique no ícone de bloqueio na barra de endereços e permita.'); }
            }
        })()">🛡️ ARTEFATO DE VISÃO</a>

        <div class="passo">
            <b>2.</b> Na Kick, clique no favorito, cole o link e ajuste a janelinha sobre a live.
        </div>
    </div>

</body>
</html>
